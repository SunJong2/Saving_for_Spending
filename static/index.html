<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container has tabbar">
        <div class="header">
            <span style="font-weight: 700; font-size: 17px;">저금통</span>
            <button class="header-btn-text" onclick="logout()">로그아웃</button>
        </div>

        <!-- 목표가 있을 때 보여줄 영역 (기본 숨김) -->
        <div id="goalSection" style="display: none; margin-top: 16px;">
            <p class="text-sub" id="dday"></p>
            <h1 class="title-lg" id="goalName"></h1>
            <div id="overdueBanner" style="display: none; background: #FFF5F5;
                border-radius: 12px; padding: 14px 16px; margin: 12px 0;">
                <p style="font-size: 14px; color: #F04452; font-weight: 600;">마감일이 지났어요</p>
                <p class="text-sub" style="font-size: 13px; margin-top: 4px;">
                    조금 더 시간이 필요하면 마감일을 늘려보세요
                </p>
                <button class="btn-sub" style="width: 100%; margin-top: 12px;"
                        onclick="location.href='edit-goal.html'">
                    마감일 연장하기
                </button>
            </div>

            <!-- 저금통 자리 (다음 세션에서 꾸밈) -->
            <div style="background: var(--bg-section); border-radius: var(--radius);
                        padding: 32px 24px; text-align: center; margin: 24px 0;">
                <div style="font-size: 56px;">🐷</div>

                <!-- 진행률 바 -->
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <p id="progressText" class="text-sub" style="margin-bottom: 4px;"></p>
                <h2 id="amountText"></h2>
            </div>

            <button class="btn-primary" onclick="location.href='add-saving.html'">
                절약 기록하기
            </button>

            <!-- 보조 버튼 두 개 -->
            <div style="display: flex; gap: 8px; margin-top: 10px;">
                <button class="btn-sub" onclick="location.href='edit-goal.html'">목표 수정</button>
                <button class="btn-sub" onclick="openDeleteModal()">목표 삭제</button>
            </div>

            <h2 style="font-size: 18px; margin: 32px 0 12px;">최근 기록</h2>
            <div id="savingsList"></div>
        </div>

        <!-- 목표가 없을 때 보여줄 영역 (기본 숨김) -->
        <div id="noGoalSection" style="display: none; text-align: center; margin-top: 90px;">
            <div style="font-size: 64px;">🎯</div>
            <h1 class="title-lg" style="margin-top: 16px;" id="noGoalTitle">갖고 싶은 게 있나요?</h1>
            <p class="text-sub" style="margin: 12px 0 32px;" id="noGoalSub">목표를 세우고 아껴서 가져보세요</p>
            <button class="btn-primary" onclick="location.href='add-goal.html'" id="noGoalBtn">
                첫 목표 만들기
            </button>
        </div>
    </div>

    <div class="tabbar">
        <button class="tab active" onclick="location.href='index.html'">
            <span class="tab-icon">🏠</span>
            홈
        </button>
        <button class="tab" onclick="location.href='history.html'">
            <span class="tab-icon">🏆</span>
            히스토리
        </button>
    </div>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal-card">
            <div style="font-size: 48px;">🗑️</div>
            <h2 style="font-size: 20px; margin: 16px 0 8px;">목표를 삭제할까요?</h2>
            <p class="text-sub" style="margin-bottom: 28px; font-size: 14px;">
                지금까지 기록한 절약 내역도 함께 사라져요
            </p>
            <button class="btn-danger" onclick="deleteGoal()">삭제하기</button>
            <button class="btn-sub" style="width: 100%; margin-top: 8px;" onclick="closeDeleteModal()">
                취소
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="savingModal">
        <div class="modal-card" style="text-align: left;">
            <!-- 기본 화면 -->
            <div id="savingDetailView">
                <p class="text-sub" style="font-size: 13px;" id="savingDate"></p>
                <h2 style="font-size: 24px; margin: 8px 0 12px;" id="savingCategory"></h2>
                <p style="font-size: 32px; font-weight: 700; color: #7C4DFF; margin-bottom: 4px;" id="savingAmount"></p>

                <div id="savingMemoBox" style="display: none; background: var(--bg-section);
                        border-radius: 14px; padding: 16px; margin-top: 20px;">
                    <p style="font-size: 14px; line-height: 1.6; color: var(--text-sub);" id="savingMemo"></p>
                </div>

                <div style="display: flex; gap: 8px; margin-top: 32px;">
                    <button class="btn-sub" onclick="closeSavingModal()">닫기</button>
                    <button class="btn-sub" style="color: #F04452;" onclick="showDeleteConfirm()">삭제</button>
                </div>
            </div>

            <!-- 삭제 확인 화면 (기본 숨김) -->
            <div id="savingDeleteView" style="display: none; text-align: center;">
                <div style="font-size: 48px;">🗑️</div>
                <h2 style="font-size: 20px; margin: 16px 0 8px;">이 기록을 삭제할까요?</h2>
                <p class="text-sub" style="margin-bottom: 28px; font-size: 14px;">
                    삭제하면 되돌릴 수 없어요
                </p>
                <button class="btn-danger" onclick="deleteSaving()">삭제하기</button>
                <button class="btn-sub" style="width: 100%; margin-top: 8px;" onclick="hideDeleteConfirm()">
                    취소
                </button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");

        // 진입 가드 1차: 토큰이 아예 없으면 바로 추방
        if (!token) {
            location.href = "login.html";
        }

        async function loadGoal() {
            const response = await fetch("/goals/current", {
                headers: { "Authorization": "Bearer " + token }
            });

            // 진입 가드 2차: 토큰이 있어도 무효(만료/위조)면 추방
            if (response.status === 401) {
                localStorage.removeItem("token");   // 죽은 토큰 청소
                location.href = "login.html?expired=1";
                return;
            }

            if (response.status === 404) {
                // 진행 중 목표 없음 → 목표 만들기 화면 표시
                // 달성 이력이 있으면 "첫 목표" 문구를 덮어씀
                const historyRes = await fetch("/goals/history", {
                    headers: { "Authorization": "Bearer " + token }
                });
                const historyData = await historyRes.json();

                if (historyData.history.length > 0) {
                    document.getElementById("noGoalTitle").textContent = "다음 목표를 세워볼까요?";
                    document.getElementById("noGoalSub").textContent = "지난 목표를 해냈으니, 새 도전도 할 수 있어요";
                    document.getElementById("noGoalBtn").textContent = "새 목표 만들기";
                }

                document.getElementById("noGoalSection").style.display = "block";
                return;
            }

            // 목표 있음 → 데이터 채우고 표시
            const goal = await response.json();
            // 수정
            const ddayEl = document.getElementById("dday");
            if (goal.d_day > 0) {
                ddayEl.textContent = "D-" + goal.d_day;
                ddayEl.style.color = "";                    // 기본 색
            } else if (goal.d_day === 0) {
                ddayEl.textContent = "오늘이 마감일이에요";
                ddayEl.style.color = "#F04452";
            } else {
                ddayEl.textContent = `마감 ${Math.abs(goal.d_day)}일 지남`;
                ddayEl.style.color = "#F04452";
            }
            document.getElementById("goalName").textContent = goal.name;
            document.getElementById("amountText").textContent =
                goal.current_amount.toLocaleString() + "원 / " + goal.target_amount.toLocaleString() + "원";
            document.getElementById("progressText").textContent = goal.progress + "% 달성";

            // 진행률 바 채우기 — 100 넘어도 바는 100까지만 (숫자는 위에서 실제값 표시)
            const fillWidth = Math.min(goal.progress, 100);
            setTimeout(() => {
                document.getElementById("progressFill").style.width = fillWidth + "%";
            }, 100);    // 0%가 먼저 그려진 뒤 실제값으로 → transition 발동

            document.getElementById("goalSection").style.display = "block";
            loadSavings();

            if (goal.d_day < 0) {
                document.getElementById("overdueBanner").style.display = "block";
            }
        }

        async function loadSavings() {
            const response = await fetch("/savings", {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await response.json();

            document.getElementById("savingsList").innerHTML = data.savings
                .map(s => `
                    <div onclick='openSavingDetail(${JSON.stringify(s)})'
                        style="background: var(--bg-section); border-radius: 12px;
                                padding: 14px 16px; margin-bottom: 8px;
                                display: flex; justify-content: space-between;">
                        <span>${s.category}</span>
                        <span style="font-weight: 600;">+${s.amount.toLocaleString()}원</span>
                    </div>
                `)
                .join("");
        }
        function openDeleteModal() {
            document.getElementById("deleteModal").style.display = "flex";
        }

        function closeDeleteModal() {
            document.getElementById("deleteModal").style.display = "none";
        }

        async function deleteGoal() {
            const res = await fetch("/goals/current", {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });

            if (res.status === 401) {
                localStorage.removeItem("token");
                location.href = "login.html?expired=1";
                return;
            }

            if (res.ok) {
                location.reload();   // 홈 새로고침 → 목표가 없으니 "목표 만들기" 화면으로
            }
        }

        let selectedSavingId = null;   // 어느 기록을 삭제할지 기억

        function openSavingDetail(saving) {
            selectedSavingId = saving.id;

            document.getElementById("savingDate").textContent = saving.created_at;
            document.getElementById("savingCategory").textContent = saving.category;
            document.getElementById("savingAmount").textContent = "+" + saving.amount.toLocaleString() + "원";

            // 메모가 있을 때만 메모 박스 표시
            const memoBox = document.getElementById("savingMemoBox");
            if (saving.memo) {
                document.getElementById("savingMemo").textContent = saving.memo;
                memoBox.style.display = "block";
            } else {
                memoBox.style.display = "none";
            }

            document.getElementById("savingModal").style.display = "flex";
        }

        function closeSavingModal() {
            document.getElementById("savingModal").style.display = "none";
            hideDeleteConfirm();   // 다음에 열 때를 위해 상세 뷰로 되돌림
        }

        async function deleteSaving() {
            const res = await fetch(`/savings/${selectedSavingId}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });

            if (res.status === 401) {
                localStorage.removeItem("token");
                location.href = "login.html?expired=1";
                return;
            }

            if (res.ok) {
                location.reload();   // 목록 + 진행률 바 전부 최신화
            }
        }

        function showDeleteConfirm() {
            document.getElementById("savingDetailView").style.display = "none";
            document.getElementById("savingDeleteView").style.display = "block";
        }

        function hideDeleteConfirm() {
            document.getElementById("savingDeleteView").style.display = "none";
            document.getElementById("savingDetailView").style.display = "block";
        }
        
        function logout() {
            localStorage.removeItem("token");
            location.href = "login.html";
        }
        loadGoal();   // 페이지 열리면 즉시 실행
    </script>
</body>

</html>
