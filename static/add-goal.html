<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목표생성</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 타이틀 영역 -->
        <div style="margin-top: 80px; margin-bottom: 48px;">
            <h1 class="title-lg">어떤 걸<br>갖고 싶나요?</h1>
            <p class="text-sub" style="margin-top: 12px;">목표를 정하면 저금통이 시작돼요</p>
        </div>

        <!-- 입력 폼 영역 (form 태그 대신 div: 버튼의 자동 submit 동작 방지) -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <input class="input" type="text" id="name" placeholder="목표 이름">
            <input class="input" type="text" id="targetAmount" placeholder="목표 금액" inputmode="numeric">
            <input class="input" type="date" id="deadline" placeholder="마감일">
            <!-- 에러 문구 자리 (평소엔 비어 있고, JS가 상황별 문구를 채움) -->
            <p class="error-msg" id="errorMsg"></p>
            <button class="btn-primary" onclick="add_goal()">목표 생성</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");

        // 진입 가드 1차: 토큰이 아예 없으면 바로 추방
        if (!token) {
            location.href = "login.html";
        }
        async function checkExistingGoal() {
            const res = await fetch("/goals/current", {
            headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                // 이미 진행 중 목표가 있음 → 생성 화면에 있을 이유가 없으니 홈으로
                location.href = "index.html";
            }
            // 404(목표 없음)면 정상 → 이 화면 그대로 사용
        }
        checkExistingGoal();

        async function add_goal() {
            
            // 입력창에서 현재 값 읽기
            const name = document.getElementById("name").value;
            const targetAmount = parseInt(document.getElementById("targetAmount").value.replace(/,/g, ""));
            const deadline = document.getElementById("deadline").value;

            // 0. 프론트 입력 검증 — 서버에 보내기 전에 차단 (프론트판 "문지기는 문 앞에")
            if (!name) {
                document.getElementById("errorMsg").textContent = "이름을 입력해주세요";
                return;
            }
            if (!targetAmount || targetAmount <= 0) {
                document.getElementById("errorMsg").textContent = "올바른 형식의 금액을 입력헤주세요";
                return;
            }
            if (!deadline) {
                document.getElementById("errorMsg").textContent = "마감일을 입력해주세요";
                return;
            }
            
            const response = await fetch("/goals", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({name, target_amount: targetAmount, deadline})
            });

            if (response.status === 401) {
                localStorage.removeItem("token");   // 죽은 토큰 청소
                location.href = "login.html?expired=1";
                return;
            }

            if (response.ok) {
                const data = await response.json();
                location.href = "index.html";
            } else {
                const data = await response.json();
                document.getElementById("errorMsg").textContent = data.detail;
            }

        }
        // 금액 입력 시 실시간 콤마 표시
        document.getElementById("targetAmount").addEventListener("input", (e) => {
            // 숫자만 남기고 (콤마·문자 제거) → 다시 콤마 찍기
            let digits = e.target.value.replace(/[^0-9]/g, "");
            e.target.value = digits ? parseInt(digits).toLocaleString() : "";
        });
        document.getElementById("name").addEventListener("keydown", (e) => {
            if (e.key === "Enter") add_goal();
        });
        document.getElementById("targetAmount").addEventListener("keydown", (e) => {
            if (e.key === "Enter") add_goal();
        });
        document.getElementById("deadline").addEventListener("keydown", (e) => {
            if (e.key === "Enter") add_goal();
        });

    </script>
</body>
</html>
