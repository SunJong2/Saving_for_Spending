<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>절약기록</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 타이틀 영역 -->
        <div style="margin-top: 80px; margin-bottom: 48px;">
            <h1 class="title-lg">얼마를<br>아꼈나요?</h1>
            <p class="text-sub" style="margin-top: 12px;">참은 만큼 목표에 가까워져요</p>
        </div>

        <!-- 입력 폼 영역 (form 태그 대신 div: 버튼의 자동 submit 동작 방지) -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <input class="input" type="text" id="category" placeholder="무엇을 아꼈나요? (예: 배달음식)">
            <input class="input" type="text" id="amount" placeholder="금액" inputmode="numeric">
            <input class="input" type="text" id="memo" placeholder="메모 (선택)">
            <!-- 에러 문구 자리 (평소엔 비어 있고, JS가 상황별 문구를 채움) -->
            <p class="error-msg" id="errorMsg"></p>
            <button class="btn-primary" onclick="add_saving()">절약 기록</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");

        // 진입 가드 1차: 토큰이 아예 없으면 바로 추방
        if (!token) {
            location.href = "login.html";
        }
        async function checkGoal() {
            const res = await fetch("/goals/current", {
            headers: { "Authorization": "Bearer " + token }
            });
            if (!res.ok) {
                // 목표가 없음(404) → 기록할 대상이 없으니 홈으로
                location.href = "index.html";
            }
        }
        checkGoal();

        async function add_saving() {
            
            // 입력창에서 현재 값 읽기
            const category = document.getElementById("category").value;
            const amount = parseInt(document.getElementById("amount").value.replace(/,/g, ""));
            const memo = document.getElementById("memo").value;

            // 0. 프론트 입력 검증 — 서버에 보내기 전에 차단 (프론트판 "문지기는 문 앞에")
            if (!category) {
                document.getElementById("errorMsg").textContent = "무엇을 아꼈는지 입력해주세요";
                return;
            }
            if (!amount || amount <= 0) {
                document.getElementById("errorMsg").textContent = "올바른 형식의 금액을 입력헤주세요";
                return;
            }
            
            const response = await fetch("/savings", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({category, amount , memo})
            });

            if (response.status === 401) {
                localStorage.removeItem("token");   // 죽은 토큰 청소
                location.href = "login.html?expired=1";
                return;
            }

            if (response.ok) {
                const data = await response.json();
                if (data.goal_completed) {
                    // TODO: 다음 세션에서 축하 모달로 교체
                    alert("🎉 축하해요! 목표를 달성했어요!");   // 임시로 alert
                }
                location.href = "index.html";
            } else {
                const data = await response.json();
                document.getElementById("errorMsg").textContent = data.detail;
            }

        }
        // 금액 입력 시 실시간 콤마 표시
        document.getElementById("amount").addEventListener("input", (e) => {
            // 숫자만 남기고 (콤마·문자 제거) → 다시 콤마 찍기
            let digits = e.target.value.replace(/[^0-9]/g, "");
            e.target.value = digits ? parseInt(digits).toLocaleString() : "";
        });
        document.getElementById("category").addEventListener("keydown", (e) => {
            if (e.key === "Enter") add_saving();
        });
        document.getElementById("amount").addEventListener("keydown", (e) => {
            if (e.key === "Enter") add_saving();
        });
        document.getElementById("memo").addEventListener("keydown", (e) => {
            if (e.key === "Enter") add_saving();
        });

    </script>
</body>
</html>
